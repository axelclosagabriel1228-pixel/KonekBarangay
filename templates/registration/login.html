{% extends "base.html" %}
{% load static %}

{% block title %}Sign in - Konek Barangay{% endblock %}

{% block content %}
    <h2>Sign in</h2>
    <form method="post" action="{% url 'login' %}" style="max-width:420px">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top:12px"><button type="submit">Sign in</button></div>
    </form>
{% endblock %}
